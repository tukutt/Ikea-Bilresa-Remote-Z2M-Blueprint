blueprint:
  name: Bilresa Controller (Luminosité, Couleurs Manuelles, Animation)
  author: AI
  description: >
    Control Lights with specific usage: 
    - Molette : luminosité (bas -> off, droite -> on)
    - Clic : lance le défilement de 10 couleurs (clic à nouveau pour stopper)
    - Double clic : lance une animation "Breathe" (double clic pour stopper)
  domain: automation
  input:
    mqtt_topic:
      name: MQTT Topic
      description: "The full Zigbee2MQTT topic for your device (e.g., zigbee2mqtt/bedroom_knob)."
      default: "zigbee2mqtt/FRIENDLY_NAME_HERE"
      selector:
        text:
    controlled_entity:
      name: Light to Control
      description: "The light entity you wish to manage."
      selector:
        entity:
          domain: light
          multiple: false
    step_brightness:
      name: Brightness Step Percentage
      description: "Percentage change per scroll step (1-100)."
      default: 10
      selector:
        number: {min: 1, max: 100, step: 1, unit_of_measurement: "%"}
    color_transition:
      name: Color Transition Time
      description: "Time in seconds to transition between colors in the loop."
      default: 2
      selector:
        number: {min: 0.5, max: 10, step: 0.5, unit_of_measurement: "s"}
    session_timeout:
      name: Session Timeout
      description: "Seconds to wait for the next turn before the command sequence ends."
      default: 1
      selector:
        number: {min: 0.5, max: 5, step: 0.5, unit_of_measurement: "s"}

mode: single
max_exceeded: silent

trigger:
  - platform: mqtt
    id: "trig_on"
    topic: !input mqtt_topic
    payload: "on"
    value_template: "{{ value_json.action }}"
  - platform: mqtt
    id: "trig_off"
    topic: !input mqtt_topic
    payload: "off"
    value_template: "{{ value_json.action }}"
  - platform: mqtt
    id: "trig_on_double"
    topic: !input mqtt_topic
    payload: "on_double"
    value_template: "{{ value_json.action }}"
  - platform: mqtt
    id: "trig_off_double"
    topic: !input mqtt_topic
    payload: "off_double"
    value_template: "{{ value_json.action }}"
  - platform: mqtt
    id: "trig_scroll"
    topic: !input mqtt_topic
    value_template: "{{ value_json.action is defined and value_json.action in ['brightness_move_to_level', 'brightness_step_up', 'brightness_step_down', 'brightness_move_up', 'brightness_move_down'] }}"
    payload: "True"

variables:
  target_entity: !input controlled_entity
  s_bright: !input step_brightness

action:
  - variables:
      is_on_click: "{{ trigger.id in ['trig_on', 'trig_off'] }}"
      is_double_click: "{{ trigger.id in ['trig_on_double', 'trig_off_double'] }}"

  - choose:
      # --- SINGLE CLICK: COLOR LOOP ---
      - conditions: "{{ is_on_click }}"
        sequence:
          - variables:
              colors: 
                - [255, 0, 0]      # Rouge
                - [255, 127, 0]    # Orange
                - [255, 255, 0]    # Jaune
                - [0, 255, 0]      # Vert
                - [0, 255, 255]    # Cyan
                - [0, 0, 255]      # Bleu
                - [127, 0, 255]    # Violet
                - [255, 0, 255]    # Magenta
                - [255, 100, 150]  # Rose
                - [255, 255, 255]  # Blanc
          - repeat:
              while: "{{ true }}"
              sequence:
                - variables:
                    current_idx: "{{ (repeat.index - 1) % 10 }}"
                - service: light.turn_on
                  target: { entity_id: !input controlled_entity }
                  data:
                    rgb_color: "{{ colors[current_idx] }}"
                    transition: !input color_transition
                - wait_for_trigger:
                    - platform: mqtt
                      topic: !input mqtt_topic
                      value_template: "{{ value_json.action is defined and value_json.action != '' and value_json.action != 'None' }}"
                      payload: "True"
                  timeout:
                    seconds: !input color_transition
                - if:
                    - condition: template
                      value_template: "{{ wait.trigger is not none }}"
                  then:
                    - stop: "Color loop stopped by user interaction."

      # --- DOUBLE CLICK: ANIMATION (Breathe) ---
      - conditions: "{{ is_double_click }}"
        sequence:
          - repeat:
              while: "{{ true }}"
              sequence:
                - service: light.turn_on
                  target: { entity_id: !input controlled_entity }
                  data:
                    brightness_pct: 100
                    transition: 2
                - wait_for_trigger:
                    - platform: mqtt
                      topic: !input mqtt_topic
                      value_template: "{{ value_json.action is defined and value_json.action != '' and value_json.action != 'None' }}"
                      payload: "True"
                  timeout:
                    seconds: 2
                - if:
                    - condition: template
                      value_template: "{{ wait.trigger is not none }}"
                  then:
                    - stop: "Animation stopped by user interaction."
                - service: light.turn_on
                  target: { entity_id: !input controlled_entity }
                  data:
                    brightness_pct: 10
                    transition: 2
                - wait_for_trigger:
                    - platform: mqtt
                      topic: !input mqtt_topic
                      value_template: "{{ value_json.action is defined and value_json.action != '' and value_json.action != 'None' }}"
                      payload: "True"
                  timeout:
                    seconds: 2
                - if:
                    - condition: template
                      value_template: "{{ wait.trigger is not none }}"
                  then:
                    - stop: "Animation stopped by user interaction."

      # --- SCROLL: BRIGHTNESS ---
      - conditions: "{{ trigger.id == 'trig_scroll' }}"
        sequence:
          - variables:
              new_action: "{{ trigger.payload_json.action }}"

          - repeat:
              while: "{{ new_action in ['brightness_move_to_level', 'brightness_step_up', 'brightness_step_down', 'brightness_move_up', 'brightness_move_down'] }}"
              sequence:
                - variables:
                    current_payload: "{{ trigger.payload_json if repeat.index == 1 else wait.trigger.payload_json }}"
                    action_type: "{{ current_payload.action }}"
                    
                    raw_val: >-
                      {% if current_payload.brightness is defined %}{{ current_payload.brightness }}
                      {% elif current_payload.action_level is defined %}{{ current_payload.action_level }}
                      {% elif current_payload.action_brightness is defined %}{{ current_payload.action_brightness }}
                      {% else %}None{% endif %}
                    target_bright: "{{ 255 if raw_val in ['None', None, ''] else raw_val | int }}"
                    
                    curr_bright: "{{ state_attr(target_entity, 'brightness') | default(255) | int }}"
                    step_val: "{{ ((s_bright | float) * 2.55) | int }}"

                - choose:
                    # CAS 1: Valeur absolue (ex: IKEA tourne à gauche)
                    - conditions: "{{ action_type == 'brightness_move_to_level' and raw_val not in ['None', None, ''] }}"
                      sequence:
                        - if:
                            - condition: template
                              value_template: "{{ target_bright <= 1 }}"
                          then:
                            - service: light.turn_off
                              target: { entity_id: !input controlled_entity }
                          else:
                            - service: light.turn_on
                              target: { entity_id: !input controlled_entity }
                              data:
                                brightness: "{{ target_bright }}"
                                
                    # CAS 2: Pas relatif vers le BAS
                    - conditions: "{{ action_type in ['brightness_step_down', 'brightness_move_down'] }}"
                      sequence:
                        - if:
                            - condition: template
                              value_template: "{{ curr_bright <= step_val }}"
                          then:
                            - service: light.turn_off
                              target: { entity_id: !input controlled_entity }
                          else:
                            - service: light.turn_on
                              target: { entity_id: !input controlled_entity }
                              data:
                                brightness_step_pct: "-{{ s_bright }}"
                                
                    # CAS 3: Pas relatif vers le HAUT
                    - conditions: "{{ action_type in ['brightness_step_up', 'brightness_move_up'] }}"
                      sequence:
                        - service: light.turn_on
                          target: { entity_id: !input controlled_entity }
                          data:
                            brightness_step_pct: "{{ s_bright }}"

                # Attente du prochain cran de molette
                - wait_for_trigger:
                    - platform: mqtt
                      topic: !input mqtt_topic
                      value_template: "{{ value_json.action is defined and value_json.action in ['brightness_move_to_level', 'brightness_step_up', 'brightness_step_down', 'brightness_move_up', 'brightness_move_down'] }}"
                      payload: "True"
                    # Interruption par clic
                    - platform: mqtt
                      id: "interrupt"
                      topic: !input mqtt_topic
                      value_template: "{{ value_json.action is defined and value_json.action in ['on', 'off', 'on_double', 'off_double'] }}"
                      payload: "True"
                  timeout: 
                    seconds: !input session_timeout

                - if:
                    - condition: template
                      value_template: "{{ wait.trigger is none }}"
                  then:
                    - stop: "Session Timed Out"
                  else:
                    - choose:
                        - conditions: "{{ wait.trigger.id == 'interrupt' }}"
                          sequence:
                            - stop: "Scroll interrupted by click."
                    - variables:
                        new_action: "{{ wait.trigger.payload_json.action }}"
